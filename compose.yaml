services:
  laravel.test:
    build:
      context: ./docker-composer
      dockerfile: Dockerfile
      args:
        WWWGROUP: "${WWWGROUP}"
      # DNS config for build process
      network: host
    image: ghcr.io/diepxuan/portal:latest
    # DNS servers for container runtime
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 10.0.0.103
    dns_search:
      - diepxuan.corp
    extra_hosts:
      - "portaldev.diepxuan.io.vn:host-gateway"
      - "portalvite.diepxuan.io.vn:host-gateway"
    ports:
      - "${APP_PORT:-80}:80"
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    environment:
      WWWUSER: "${WWWUSER}"
      LARAVEL_SAIL: 1
      XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=portaldev.diepxuan.io.vn}"
      IGNITION_LOCAL_SITES_PATH: "${PWD}"
    volumes:
      - ".:/var/www/html"
    networks:
      - sail
    depends_on: {}
networks:
  sail:
    driver: bridge
